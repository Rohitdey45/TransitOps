<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransitOps Stitch UI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #101010;
      color: #fff;
      font-family: Inter, Arial, sans-serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 8px;
      border: 1px solid #fff;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: -1;
    }
    main {
      width: min(1100px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 56px 0;
    }
    h1 {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: clamp(2rem, 5vw, 4rem);
    }
    p {
      margin: 0 0 32px;
      color: #c4c7c8;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: .78rem;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    a {
      min-height: 112px;
      display: grid;
      align-content: space-between;
      padding: 18px;
      border: 1px solid #444748;
      background: #141313;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 800;
    }
    a:hover {
      border-color: #fff;
      background: #fff;
      color: #101010;
    }
    span {
      opacity: .72;
      font-size: .72rem;
    }
    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>TransitOps Stitch UI</h1>
    <p>All exact Stitch screens are flattened in this same folder.</p>
    <section class="grid">
      <a href="./stitch-login.html">Login <span>Secure command interface</span></a>
      <a href="./stitch-dashboard.html">Dashboard <span>Command center</span></a>
      <a href="./stitch-vehicles.html">Vehicles <span>Registry</span></a>
      <a href="./stitch-drivers.html">Drivers <span>Management</span></a>
      <a href="./stitch-trips.html">Trips <span>Trip management</span></a>
      <a href="./stitch-maintenance.html">Maintenance <span>Control</span></a>
      <a href="./stitch-expenses.html">Expenses <span>Fuel and expenses</span></a>
      <a href="./stitch-analytics.html">Analytics <span>Reports</span></a>
      <a href="./stitch-documents.html">Documents <span>Control</span></a>
    </section>
  </main>
</body>
</html>
